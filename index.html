<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EcoHuella — Tu comunidad, tu planeta, tu huella</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
:root{--verde:#2C5F2D;--verde2:#3d7a3e;--musgo:#97BC62;--crema:#F5F1E8;--cafe:#5C3D11;--blanco:#FAFAF7;--gris:#6B7280;--rojo:#C0392B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--verde)}
body{font-family:'DM Sans',sans-serif;color:#1a1a1a;max-width:430px;margin:0 auto;background:var(--blanco);height:100vh;display:flex;flex-direction:column}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes load{to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scan{0%,100%{top:8px}50%{top:calc(100% - 16px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,var(--verde) 0%,#1a3d1b 60%,var(--cafe) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,transform .6s}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none}
.sp-leaf{font-size:72px;animation:float 2s ease-in-out infinite}
.sp-title{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:var(--crema);letter-spacing:-1px;margin:12px 0 4px}
.sp-sub{color:var(--musgo);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.sp-bar{margin-top:48px;width:48px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;width:0;background:var(--musgo);border-radius:2px;animation:load 1.8s ease forwards}

/* AUTH */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
#screen-auth{background:linear-gradient(160deg,var(--verde) 0%,#1a3d1b 55%,var(--cafe) 100%);justify-content:center;align-items:center;padding:32px 28px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;color:var(--crema)}
.auth-logo p{color:var(--musgo);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.auth-card{background:var(--blanco);border-radius:24px;padding:28px 24px;width:100%;box-shadow:0 12px 40px rgba(44,95,45,.22)}
.auth-tabs{display:flex;gap:4px;background:#f0f0ea;border-radius:12px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;color:var(--gris)}
.auth-tab.active{background:var(--verde);color:#fff}
.inp{width:100%;padding:14px 16px;border:1.5px solid #e0e0d8;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--blanco);transition:border .2s;outline:none;margin-bottom:12px}
.inp:focus{border-color:var(--verde)}
.btn-p{width:100%;padding:15px;background:var(--verde);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-p:active{transform:scale(.98)}
.auth-form{display:none}.auth-form.active{display:block}

/* HEADER */
.app-header{padding:16px 18px 12px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.h-av{width:36px;height:36px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:16px}
.h-gr{font-size:12px;color:var(--gris)}.h-nm{font-size:16px;font-weight:600}
.notif-btn{width:36px;height:36px;border-radius:50%;background:#f0f0ea;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--rojo);border-radius:50%;border:2px solid #fff}

.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}
.sc::-webkit-scrollbar{display:none}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(0,0,0,.08);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0}
.ni-i{font-size:22px;transition:transform .2s}
.ni-l{font-size:10px;color:var(--gris);font-weight:500}
.ni.active .ni-i{transform:scale(1.15)}
.ni.active .ni-l{color:var(--verde);font-weight:700}

/* HOME */
.hero{margin:14px;border-radius:20px;background:linear-gradient(135deg,var(--verde),var(--verde2));padding:22px 18px;color:#fff;position:relative;overflow:hidden}
.hero::before{content:'🌿';position:absolute;right:-10px;bottom:-20px;font-size:100px;opacity:.13}
.hero h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:5px}
.hero p{font-size:13px;opacity:.85;line-height:1.5}
.eco-row{display:flex;gap:8px;margin-top:14px}
.ec-badge{background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border-radius:50px;padding:6px 14px;display:flex;align-items:center;gap:6px}
.ec-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.ec-lbl{font-size:11px;opacity:.8}
.sec{font-size:17px;font-weight:700;padding:14px 14px 8px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}
.qa{background:#fff;border:1.5px solid #e8e8e0;border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .2s}
.qa:active{transform:scale(.97)}
.qa-ic{font-size:28px;margin-bottom:8px}
.qa-t{font-size:13px;font-weight:600}
.qa-s{font-size:11px;color:var(--gris);margin-top:2px}
.plants-row{display:flex;gap:12px;padding:0 14px 4px;overflow-x:auto}
.plants-row::-webkit-scrollbar{display:none}
.pcard{min-width:148px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:14px;cursor:pointer;transition:all .2s;flex-shrink:0}
.pcard:active{transform:scale(.97)}
.p-em{font-size:34px;margin-bottom:8px}
.p-nm{font-size:13px;font-weight:600}
.p-sp{font-size:11px;color:var(--gris);margin-bottom:8px}
.hbar{height:5px;background:#e8e8e0;border-radius:3px;overflow:hidden}
.hbar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--musgo),var(--verde))}
.hbar-t{font-size:10px;color:var(--gris);margin-top:4px}
.est{text-align:center;padding:28px 14px}
.est-i{font-size:48px;margin-bottom:12px}
.est-t{font-size:14px;color:var(--gris);line-height:1.5}
.alerts-list{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.al-card{background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;border:1.5px solid #e8e8e0}
.al-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.al-badge{margin-left:auto;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600}
.urgente{background:#FEE2E2;color:var(--rojo)}.hoy{background:#FEF3C7;color:#92400E}.ok-b{background:#F0FDF4;color:#166534}
.tip-card{margin:0 14px 14px;background:linear-gradient(135deg,#f0f7f0,#e8f5e9);border-radius:16px;padding:16px;border-left:4px solid var(--verde)}
.tip-lbl{font-size:10px;font-weight:700;color:var(--verde);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tip-txt{font-size:13px;color:#2a2a2a;line-height:1.5}

/* ===== DIAGNÓSTICO ===== */
.diag-wrap{margin:0 14px 14px;border-radius:20px;overflow:hidden;border:1.5px solid #e8e8e0;background:#fff}

/* Zona cámara */
.cam-zone{position:relative;background:#0d0d0d;overflow:hidden;border-radius:20px 20px 0 0;min-height:240px;display:flex;align-items:center;justify-content:center}
.cam-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:8px}
.cam-ph .ci{font-size:52px}
.cam-ph .ct{font-size:17px;font-weight:700;color:#fff}
.cam-ph .cs{font-size:13px;color:rgba(255,255,255,.55);line-height:1.5;max-width:240px}
#cam-video{width:100%;display:block;object-fit:cover;border-radius:0}
#cam-preview{width:100%;display:block;object-fit:cover;border-radius:0}
#cam-canvas{display:none}
.vf{position:absolute;inset:0;pointer-events:none}
.vfc{position:absolute;width:26px;height:26px;border-color:#4eff91;border-style:solid}
.vfc.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.vfc.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.vfc.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.vfc.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.vfs{position:absolute;left:14px;right:14px;height:2px;background:linear-gradient(90deg,transparent,#4eff91,transparent);animation:scan 2.2s ease-in-out infinite}
.vf-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(6px);color:#4eff91;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;letter-spacing:1px;white-space:nowrap}

/* Controles */
.cam-ctrl{display:flex;gap:10px;padding:12px 14px;background:#f8f8f5}
.cbtn{flex:1;padding:13px 10px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.cbtn:active{transform:scale(.96)}
.cb-cam{background:var(--verde);color:#fff}
.cb-gal{background:#f0f0ea;color:#1a1a1a}
.cb-cancel{background:#fee2e2;color:var(--rojo)}
.cb-snap{background:var(--verde);color:#fff;flex:2}
.cb-analyze{background:linear-gradient(135deg,#1a3d1b,var(--verde2));color:#fff;flex:2}
.cb-retake{background:#f0f0ea;color:#1a1a1a}

/* AI Loading */
.ai-load{display:none;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center;background:linear-gradient(135deg,#f0f7f0,#fafaf5);border-top:1px solid #e8e8e0}
.ai-load.show{display:flex}
.ai-spin{font-size:40px;animation:spin 2s linear infinite}
.ai-lt{font-size:16px;font-weight:700;color:var(--verde)}
.ai-ls{font-size:13px;color:var(--gris);line-height:1.5}
.ai-steps{display:flex;flex-direction:column;gap:6px;width:100%}
.ai-step{font-size:12px;padding:7px 14px;border-radius:50px;background:#e8f5e9;color:var(--verde);font-weight:600;transition:all .3s;text-align:center}
.ai-step.active{background:var(--verde);color:#fff;animation:pulse 1s ease-in-out infinite}
.ai-step.done{background:#c8e6c9;color:#1b5e20}

/* Resultado */
.dr-hdr{background:linear-gradient(135deg,var(--verde),var(--verde2));padding:20px;color:#fff}
.dr-plant{font-family:'Playfair Display',serif;font-size:21px;font-weight:700}
.dr-sp{font-size:12px;opacity:.8;margin-top:2px}
.dr-score{text-align:center;padding:20px}
.dr-snum{font-family:'Space Mono',monospace;font-size:52px;font-weight:700}
.dr-slbl{font-size:12px;color:var(--gris);text-transform:uppercase;letter-spacing:1px}
.dr-body{padding:0 18px 18px}
.dr-stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gris);margin:14px 0 7px}
.dr-cond{font-size:16px;font-weight:700;margin-bottom:4px}
.dr-cause{font-size:13px;color:var(--gris);line-height:1.5}
.dr-tag{display:inline-block;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;margin:3px}
.tg{background:#F0FDF4;color:#166534}.tr{background:#FEE2E2;color:var(--rojo)}.ty{background:#FEF3C7;color:#92400E}
.aux-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0ea}
.aux-ic{font-size:17px;flex-shrink:0;margin-top:1px}
.aux-tx{font-size:13px;color:#2a2a2a;line-height:1.5}
.dr-full{font-size:13px;color:#2a2a2a;line-height:1.7;background:#f8f8f5;border-radius:12px;padding:14px;margin-top:6px}
.btn-save{width:calc(100% - 36px);margin:0 18px 18px;padding:14px;background:var(--verde);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* AI Badge */
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1a3d1b,var(--verde2));color:#fff;border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;margin:0 14px 12px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#4eff91;animation:pulse 1.2s ease-in-out infinite}

/* COMUNIDAD */
.vcard{margin:0 14px 12px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:15px;display:flex;gap:13px}
.vlogo{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--verde),var(--musgo));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.vnm{font-size:15px;font-weight:700;margin-bottom:3px}
.vesp{font-size:12px;color:var(--gris);margin-bottom:7px}
.vtags{display:flex;gap:5px;flex-wrap:wrap}
.vtag{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;background:#f0f7f0;color:var(--verde)}
.vbtns{margin-top:9px;display:flex;gap:7px}
.vbtn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--verde);background:#fff;color:var(--verde);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif}
.vbtn.p{background:var(--verde);color:#fff}
.vbtn:active{transform:scale(.97)}

/* PERFIL */
.phdr{background:linear-gradient(160deg,var(--verde),#1a3d1b);padding:28px 20px 22px;color:#fff;text-align:center}
.pav{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px}
.pnm{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.pem{font-size:13px;opacity:.75;margin-top:3px}
.pstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#e8e8e0;border-radius:16px;margin:14px;overflow:hidden}
.pst{background:#fff;padding:16px 10px;text-align:center}
.psn{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--verde)}
.psl{font-size:11px;color:var(--gris);margin-top:3px}
.mitem{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid #f0f0ea}
.mitem:active{background:#f5f5f0}
.mic{width:40px;height:40px;border-radius:12px;background:#f0f7f0;display:flex;align-items:center;justify-content:center;font-size:20px}
.mt{flex:1}.mtt{font-size:15px;font-weight:600}.mts{font-size:12px;color:var(--gris)}
.logout-btn{margin:14px;width:calc(100% - 28px);padding:14px;background:#FEE2E2;color:var(--rojo);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}

/* DIARIO */
.de{margin:0 14px 10px;background:#fff;border-radius:14px;border:1.5px solid #e8e8e0;padding:14px}
.de-meta{display:flex;justify-content:space-between;margin-bottom:7px}
.de-p{font-size:13px;font-weight:600;color:var(--verde)}
.de-d{font-size:11px;color:var(--gris)}
.de-n{font-size:14px;color:#2a2a2a;line-height:1.5}
.de-h{display:flex;align-items:center;gap:6px;margin-top:7px}
.de-hl{font-size:11px;color:var(--gris)}
.de-hn{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--verde)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
.mc{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 40px;width:100%;max-width:430px;transform:translateY(30px);transition:transform .3s cubic-bezier(.22,1,.36,1);max-height:88vh;overflow-y:auto}
.mo.open .mc{transform:translateY(0)}
.mh{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.mtitle{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;display:block}
.ep{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eo{font-size:24px;width:44px;height:44px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#f5f5f0}
.eo.sel{border-color:var(--verde);background:#e8f5e9}
.si{width:100%;padding:14px 16px;border:1.5px solid #e0e0d8;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--blanco);outline:none;appearance:none}
.rw{display:flex;align-items:center;gap:12px}
.rw input[type=range]{flex:1;accent-color:var(--verde)}
.rv{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--verde);width:38px;text-align:center}
.mis{margin:0 14px 12px;background:#f0f7f0;border-radius:14px;padding:16px}
.mit{font-size:13px;font-weight:700;color:var(--verde);margin-bottom:6px}
.mix{font-size:13px;color:#2a2a2a;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:50px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-leaf">🌿</div>
  <div class="sp-title">EcoHuella</div>
  <div class="sp-sub">Tu comunidad, tu planeta, tu huella</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="screen active" id="screen-auth">
  <div class="auth-logo">
    <div style="font-size:54px">🌱</div>
    <h1>EcoHuella</h1>
    <p>Tu comunidad · Tu planeta · Tu huella</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</div>
      <div class="auth-tab" onclick="switchTab('register')">Registrarse</div>
    </div>
    <div class="auth-form active" id="form-login">
      <input class="inp" type="email" id="li-email" placeholder="Correo electrónico">
      <input class="inp" type="password" id="li-pass" placeholder="Contraseña">
      <button class="btn-p" onclick="doLogin()">Entrar 🌿</button>
    </div>
    <div class="auth-form" id="form-register">
      <input class="inp" type="text" id="re-name" placeholder="Tu nombre completo">
      <input class="inp" type="email" id="re-email" placeholder="Correo electrónico">
      <input class="inp" type="password" id="re-pass" placeholder="Contraseña (mín. 6 caracteres)">
      <button class="btn-p" onclick="doRegister()">Crear cuenta 🌱</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-main">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="h-av">🌿</div>
      <div><div class="h-gr">Buenos días,</div><div class="h-nm" id="hnm">Ecohabitante</div></div>
    </div>
    <button class="notif-btn" onclick="navTo('plantas')">🔔<span class="notif-dot"></span></button>
  </div>
  <div class="sc" id="mc"></div>
  <nav class="bottom-nav">
    <div class="ni active" id="nav-home" onclick="navTo('home')"><span class="ni-i">🏡</span><span class="ni-l">Inicio</span></div>

// ============================================================
// DB
// ============================================================
async function initDB(){
  const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`});
  const sv=localStorage.getItem('eco_db3');
  if(sv){const b=Uint8Array.from(atob(sv),c=>c.charCodeAt(0));DB=new SQL.Database(b);}
  else{
    DB=new SQL.Database();
    DB.run(`CREATE TABLE IF NOT EXISTS usuarios(id INTEGER PRIMARY KEY AUTOINCREMENT,nombre TEXT,email TEXT UNIQUE,password TEXT,creado TEXT DEFAULT(date('now')));
    CREATE TABLE IF NOT EXISTS plantas(id INTEGER PRIMARY KEY AUTOINCREMENT,uid INTEGER,emoji TEXT DEFAULT'🌿',nombre TEXT,especie TEXT,tipo TEXT,salud INTEGER DEFAULT 75,creado TEXT DEFAULT(date('now')));
    CREATE TABLE IF NOT EXISTS diario(id INTEGER PRIMARY KEY AUTOINCREMENT,planta_id INTEGER,uid INTEGER,actividad TEXT,salud INTEGER,nota TEXT,fecha TEXT DEFAULT(date('now')));
    CREATE TABLE IF NOT EXISTS diags(id INTEGER PRIMARY KEY AUTOINCREMENT,uid INTEGER,planta_id INTEGER,condicion TEXT,salud INTEGER,resultado TEXT,fecha TEXT DEFAULT(date('now')));`);
    sDB();
  }
}
function sDB(){const d=DB.export();localStorage.setItem('eco_db3',btoa(String.fromCharCode(...d)));}
function q(sql,p=[]){const s=DB.prepare(sql);s.bind(p);const r=[];while(s.step())r.push(s.getAsObject());s.free();return r;}
function run(sql,p=[]){DB.run(sql,p);sDB();}

function switchTab(t){
  document.querySelectorAll('.auth-tab').forEach((e,i)=>e.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('form-login').classList.toggle('active',t==='login');
  document.getElementById('form-register').classList.toggle('active',t==='register');
}
function doLogin(){
  const em=document.getElementById('li-email').value.trim();
  const pw=document.getElementById('li-pass').value;
  if(!em||!pw){toast('Completa todos los campos');return;}
  const u=q('SELECT * FROM usuarios WHERE email=? AND password=?',[em,pw]);
  if(!u.length){toast('Correo o contraseña incorrectos');return;}
  loginOK(u[0]);
}
function doRegister(){
  const nm=document.getElementById('re-name').value.trim();
  const em=document.getElementById('re-email').value.trim();
  const pw=document.getElementById('re-pass').value;
  if(!nm||!em||!pw){toast('Completa todos los campos');return;}
  if(pw.length<6){toast('Contraseña mínimo 6 caracteres');return;}
  if(q('SELECT id FROM usuarios WHERE email=?',[em]).length){toast('Este correo ya está registrado');return;}
  run('INSERT INTO usuarios(nombre,email,password)VALUES(?,?,?)',[nm,em,pw]);
  loginOK(q('SELECT * FROM usuarios WHERE email=?',[em])[0]);
}
function loginOK(u){
  CU=u;localStorage.setItem('eco_uid',u.id);

// ============================================================
// CÁMARA — funciones puras de DOM
// ============================================================
async function startCam(){
  try{
    const cst={video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}};
    camStream=await navigator.mediaDevices.getUserMedia(cst);
    const v=document.getElementById('cvid');
    v.srcObject=camStream;v.style.display='block';
    document.getElementById('cph').style.display='none';
    document.getElementById('vfo').style.display='block';
    document.getElementById('cc-init').style.display='none';
    document.getElementById('cc-live').style.display='flex';
    document.getElementById('cc-cap').style.display='none';
  }catch(e){
    toast('No se pudo acceder a la cámara. Verifica permisos del navegador.');
    console.error(e);
  }
}

function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const v=document.getElementById('cvid');if(v)v.style.display='none';
  const ph=document.getElementById('cph');if(ph)ph.style.display='flex';
  const vf=document.getElementById('vfo');if(vf)vf.style.display='none';
  const p=document.getElementById('cprev');if(p)p.style.display='none';
  const i=document.getElementById('cc-init');if(i)i.style.display='flex';
  const l=document.getElementById('cc-live');if(l)l.style.display='none';
  const c=document.getElementById('cc-cap');if(c)c.style.display='none';
  capB64=null;
}

function snap(){
  const v=document.getElementById('cvid');
  const c=document.getElementById('ccan');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  showPrev(c.toDataURL('image/jpeg',0.88));
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}

function loadGal(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>showPrev(ev.target.result);
  r.readAsDataURL(f);
  e.target.value='';
}

function showPrev(durl){
  capB64=durl.split(',')[1];
  const p=document.getElementById('cprev');
  const v=document.getElementById('cvid');
  const ph=document.getElementById('cph');
  const vf=document.getElementById('vfo');
  p.src=durl;p.style.display='block';
  if(v)v.style.display='none';
  if(ph)ph.style.display='none';
  if(vf)vf.style.display='none';
  document.getElementById('cc-init').style.display='none';
  document.getElementById('cc-live').style.display='none';
  document.getElementById('cc-cap').style.display='flex';
}

function retake(){
  capB64=null;
  const p=document.getElementById('cprev');if(p)p.style.display='none';
  document.getElementById('cc-cap').style.display='none';
  document.getElementById('cc-init').style.display='flex';
  const ph=document.getElementById('cph');if(ph)ph.style.display='flex';
}

  try{
    const ctx=plant?`La planta registrada es: ${plant.nombre} (${plant.especie||plant.tipo||'tipo desconocido'}), con salud registrada de ${plant.salud}%.`:`No hay planta registrada para este análisis.`;

    const sysPr=`Eres EcoHuella AI, un experto botánico con 20 años de experiencia en diagnóstico fitosanitario, agronomía tropical, fitopatología y cuidado de plantas domésticas y cultivos profesionales en Latinoamérica.

Tu misión es analizar imágenes reales de plantas y proporcionar diagnósticos botánicos precisos, útiles y accionables para comunidades en Venezuela y América Latina.

REGLAS:
- Responde SIEMPRE en español
- Analiza la imagen con detalle técnico: color, textura, morfología foliar, síntomas visibles
- Sé directo y técnico pero comprensible para usuarios domésticos y profesionales
- Si la imagen no muestra una planta claramente, analiza lo que puedas ver e indica que la imagen es limitada
- NUNCA digas que no puedes analizar; siempre proporciona tu mejor análisis profesional
- Proporciona consejos aplicables en Venezuela (clima tropical, disponibilidad de insumos)

Responde ÚNICAMENTE con este JSON válido (sin texto extra, sin markdown):
{
  "especie_detectada": "nombre común y científico si es identificable",
  "condicion_detectada": "diagnóstico principal en 4-7 palabras",
  "causa_principal": "explicación técnica de la causa en 2 oraciones",
  "porcentaje_salud": 75,
  "indicadores_positivos": ["señal positiva 1","señal positiva 2"],
  "indicadores_negativos": ["problema 1","problema 2"],
  "primeros_auxilios": ["acción inmediata 1","acción 2","acción 3","acción 4","acción 5"],
  "cuidados_preventivos": ["prevención 1","prevención 2","prevención 3"],
  "nivel_urgencia": "bajo",
  "resumen_profesional": "Párrafo de 4-5 oraciones con análisis completo, contexto botánico, pronóstico y recomendación general."
}`;

    const uMsg=`${ctx}

Analiza esta fotografía de la planta en detalle. Examina: color de hojas (clorosis, necrosis, manchas), estado del tallo, turgencia foliar, presencia de plagas o patógenos visibles, patrón de distribución de síntomas y cualquier señal de estrés hídrico, nutricional o fitosanitario. Proporciona tu diagnóstico botánico profesional completo.`;

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system:sysPr,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:capB64}},
          {type:'text',text:uMsg}
        ]}]
      })
    });

    clearInterval(iv);
    steps.forEach(s=>{const el=document.getElementById(s);if(el){el.classList.remove('active');el.classList.add('done');}});

    if(!resp.ok){
      const ed=await resp.json().catch(()=>({}));
      throw new Error(ed.error?.message||`Error HTTP ${resp.status}`);
    }

    const data=await resp.json();
    const rawTxt=data.content?.find(c=>c.type==='text')?.text||'';

    let result;
    try{
      const clean=rawTxt.replace(/```json|```/g,'').trim();
      result=JSON.parse(clean);
    }catch(pe){
      result={especie_detectada:'Planta analizada',condicion_detectada:'Ver análisis completo',causa_principal:'Diagnóstico generado por IA',porcentaje_salud:70,indicadores_positivos:['Planta analizada con IA'],indicadores_negativos:[],primeros_auxilios:['Revisa el análisis profesional a continuación'],cuidados_preventivos:['Monitorea tu planta regularmente'],nivel_urgencia:'bajo',resumen_profesional:rawTxt};
    }

    ail.classList.remove('show');

    const salud=Math.max(10,Math.min(100,parseInt(result.porcentaje_salud)||70));
    if(plant)run('UPDATE plantas SET salud=? WHERE id=?',[salud,plant.id]);
    run('INSERT INTO diags(uid,planta_id,condicion,salud,resultado)VALUES(?,?,?,?,?)',[CU.id,pid||null,result.condicion_detectada||'Diagnóstico',salud,JSON.stringify(result)]);

    showResult(result,plant,salud);

  }catch(err){
    clearInterval(iv);
    document.getElementById('ail').classList.remove('show');
    document.getElementById('cc-cap').style.display='flex';
    console.error('Claude API error:',err);
    toast('⚠️ Error al analizar: '+err.message);
  }
}

function showResult(r,plant,salud){
  const col=salud>=75?'#2C5F2D':salud>=50?'#D97706':'#C0392B';
  const urgMap={bajo:'#166534,#F0FDF4',moderado:'#92400E,#FEF3C7',alto:'#9A3412,#FEF2F2',crítico:'#7F1D1D,#FEE2E2'};
  const [uc,ubg]=(urgMap[r.nivel_urgencia]||urgMap['bajo']).split(',');
  const tPos=(r.indicadores_positivos||[]).map(t=>`<span class="dr-tag tg">✅ ${t}</span>`).join('');
  const tNeg=(r.indicadores_negativos||[]).map(t=>`<span class="dr-tag tr">⚠️ ${t}</span>`).join('');
  const aux=(r.primeros_auxilios||[]).map((a,i)=>`<div class="aux-item"><div class="aux-ic">${['🩺','💊','🌿','💧','☀️'][i]||'🩺'}</div><div class="aux-tx">${a}</div></div>`).join('');
  const prev=(r.cuidados_preventivos||[]).map(a=>`<div class="aux-item"><div class="aux-ic">🔮</div><div class="aux-tx">${a}</div></div>`).join('');

  document.getElementById('dr').innerHTML=`
    <div class="dr-hdr">
      <div class="dr-plant">${plant?plant.emoji+' '+plant.nombre:'🔬 Análisis de Planta'}</div>
      <div class="dr-sp">${r.especie_detectada||''} · ${new Date().toLocaleDateString('es-ES')}</div>
    </div>
    <div class="dr-score">
      <div class="dr-snum" style="color:${col}">${salud}%</div>
      <div class="dr-slbl">Índice de salud</div>
      <div style="margin-top:8px"><span style="color:${uc};background:${ubg};font-size:12px;font-weight:700;padding:3px 12px;border-radius:50px">Urgencia: ${r.nivel_urgencia||'bajo'}</span></div>
    </div>
    <div class="dr-body">
      <div class="dr-stitle">Condición detectada</div>
      <div class="dr-cond">${r.condicion_detectada}</div>
      <div class="dr-cause">${r.causa_principal}</div>
      ${(tPos||tNeg)?`<div class="dr-stitle">Indicadores observados</div>${tPos}${tNeg}`:''}
      <div class="dr-stitle">Primeros auxilios</div>${aux}
      ${prev?`<div class="dr-stitle">Cuidados preventivos</div>${prev}`:''}
      <div class="dr-stitle">Análisis profesional completo</div>
      <div class="dr-full">${r.resumen_profesional||''}</div>
    </div>
    <button class="btn-save" onclick="toast('Diagnóstico guardado ✅');navTo('diagnostico')">Guardar diagnóstico</button>`;
}

function showPlant(pid){
  const p=q('SELECT * FROM plantas WHERE id=?',[pid])[0];
  const di=q('SELECT * FROM diario WHERE planta_id=? ORDER BY fecha DESC LIMIT 5',[pid]);
  if(!p)return;
  const col=p.salud>=75?'var(--verde)':p.salud>=50?'#D97706':'var(--rojo)';
  const dH=di.length?di.map(e=>`<div class="de" style="margin:0 0 10px"><div class="de-meta"><div class="de-p">${e.actividad}</div><div class="de-d">${e.fecha}</div></div><div class="de-n">${e.nota||'Sin nota'}</div><div class="de-h"><div class="de-hl">Salud:</div><div class="de-hn">${e.salud}%</div></div></div>`).join(''):
    '<div style="padding:12px;font-size:13px;color:var(--gris)">Sin entradas en el diario aún</div>';
  document.getElementById('mc').innerHTML=`
  <div style="padding:14px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <button onclick="navTo('plantas')" style="background:#f0f0ea;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer">‹</button>
      <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700">${p.emoji} ${p.nombre}</div>
    </div>

      <div class="dr-hdr"><div class="dr-plant">${p.emoji} ${p.nombre}</div><div class="dr-sp">${p.especie||''} · ${p.tipo||''}</div></div>
      <div class="dr-score"><div class="dr-snum" style="color:${col}">${p.salud}%</div><div class="dr-slbl">Índice de salud actual</div></div>
      <div class="dr-body">

          <button onclick="openDiaryFor(${p.id})" style="padding:12px;background:var(--verde);border:none;border-radius:12px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif">📔 Anotar</button>

      </div>
    </div>
  </div>`;
}

function delPlant(pid){
  if(!confirm('¿Eliminar esta planta y su historial?'))return;
  run('DELETE FROM diario WHERE planta_id=?',[pid]);
  run('DELETE FROM diags WHERE planta_id=?',[pid]);
  run('DELETE FROM plantas WHERE id=?',[pid]);
  toast('Planta eliminada');navTo('plantas');
}

function openAddPlant(){document.getElementById('mo-plant').classList.add('open');}
function selE(el){document.querySelectorAll('.eo').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');SE=el.dataset.e;}
function savePlant(){
  const nm=document.getElementById('pnm').value.trim();
  const sp=document.getElementById('psp').value.trim();
  const ty=document.getElementById('pty').value;
  const hl=parseInt(document.getElementById('phl').value);
  const nt=document.getElementById('pnt').value.trim();
  if(!nm){toast('Ingresa un nombre para la planta');return;}
  run('INSERT INTO plantas(uid,emoji,nombre,especie,tipo,salud)VALUES(?,?,?,?,?,?)',[CU.id,SE,nm,sp,ty,hl]);
  const pid=q('SELECT last_insert_rowid() as id')[0].id;
  if(nt)run('INSERT INTO diario(planta_id,uid,actividad,salud,nota)VALUES(?,?,?,?,?)',[pid,CU.id,'🌱 Registro inicial',hl,nt]);
  document.getElementById('pnm').value='';
  document.getElementById('psp').value='';
  document.getElementById('pnt').value='';
  document.getElementById('mo-plant').classList.remove('open');
  toast(`${SE} ${nm} agregada!`);navTo(CN);
}
function openDiary(){
  const pl=q('SELECT * FROM plantas WHERE uid=?',[CU.id]);
  if(!pl.length){toast('Primero agrega una planta');return;}
  document.getElementById('dps').innerHTML=pl.map(p=>`<option value="${p.id}">${p.emoji} ${p.nombre}</option>`).join('');
  document.getElementById('mo-diary').classList.add('open');
}
function openDiaryFor(pid){
  openDiary();
  setTimeout(()=>{const s=document.getElementById('dps');if(s)s.value=pid;},120);
}
function saveDiary(){
  const pid=document.getElementById('dps').value;
  const act=document.getElementById('dact').value;
  const hl=parseInt(document.getElementById('dhl').value);
  const nt=document.getElementById('dnt').value.trim();
  if(!pid){toast('Selecciona una planta');return;}
  run('UPDATE plantas SET salud=? WHERE id=?',[hl,pid]);
  run('INSERT INTO diario(planta_id,uid,actividad,salud,nota)VALUES(?,?,?,?,?)',[pid,CU.id,act,hl,nt]);
  document.getElementById('dnt').value='';
  document.getElementById('mo-diary').classList.remove('open');
  toast('Entrada guardada en el diario 📔');navTo(CN);
}
