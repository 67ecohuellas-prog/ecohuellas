<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EcoHuella</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --v:#2C5F2D;--v2:#3d7a3e;--m:#97BC62;--cr:#F5F1E8;
  --ca:#5C3D11;--bl:#FAFAF7;--gr:#6B7280;--ro:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--v);overflow:hidden}
body{font-family:'DM Sans',sans-serif;color:#1a1a1a;max-width:430px;margin:0 auto;background:var(--bl);height:100vh;display:flex;flex-direction:column;position:relative}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scan{0%,100%{top:10px}50%{top:calc(100% - 14px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ─── SPLASH ─── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,var(--v) 0%,#1a3d1b 55%,var(--ca) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .7s ease,transform .7s ease;
}
#splash.out{opacity:0;transform:scale(1.05);pointer-events:none}
.sp-ic{font-size:80px;animation:float 2.2s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(0,0,0,.3))}
.sp-t{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;color:var(--cr);margin:14px 0 4px;letter-spacing:-1px}
.sp-s{color:var(--m);font-size:11px;letter-spacing:3px;text-transform:uppercase}
.sp-bar{margin-top:52px;width:56px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:var(--m);border-radius:2px;width:0;animation:fillbar 2s ease forwards}
@keyframes fillbar{to{width:100%}}

/* ─── SCREENS ─── */
.scr{display:none;flex-direction:column;flex:1;overflow:hidden}
.scr.on{display:flex}

/* ─── AUTH ─── */
#scr-auth{
  background:linear-gradient(160deg,var(--v) 0%,#1a3d1b 52%,var(--ca) 100%);
  justify-content:center;align-items:center;padding:28px 24px;
}
.auth-logo{text-align:center;margin-bottom:30px;animation:fadeUp .6s ease}
.auth-logo h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:900;color:var(--cr)}
.auth-logo p{color:var(--m);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.auth-card{background:var(--bl);border-radius:24px;padding:26px 22px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:fadeUp .6s .1s ease both}
.atabs{display:flex;gap:4px;background:#ededea;border-radius:12px;padding:4px;margin-bottom:18px}
.atab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gr);transition:all .2s}
.atab.on{background:var(--v);color:#fff}
.aform{display:none}.aform.on{display:block}
.inp{width:100%;padding:14px 16px;border:1.5px solid #deded8;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:#fff;outline:none;margin-bottom:11px;transition:border .2s}
.inp:focus{border-color:var(--v)}
.btnp{width:100%;padding:15px;background:var(--v);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btnp:active{transform:scale(.98);background:#1e4520}

/* ─── HEADER ─── */
.hdr{padding:15px 18px 11px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hav{width:36px;height:36px;border-radius:50%;background:var(--v);display:flex;align-items:center;justify-content:center;font-size:17px}
.hgr{font-size:12px;color:var(--gr)}.hnm{font-size:16px;font-weight:600}
.nbtn{width:36px;height:36px;border-radius:50%;background:#f0f0ea;border:none;cursor:pointer;font-size:17px;position:relative;display:flex;align-items:center;justify-content:center}
.ndot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--ro);border-radius:50%;border:2px solid #fff}

/* ─── SCROLL CONTENT ─── */
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px}
.sc::-webkit-scrollbar{display:none}

/* ─── BOTTOM NAV ─── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:#fff;
  border-top:1px solid rgba(0,0,0,.07);display:flex;
  padding:7px 0 calc(7px + env(safe-area-inset-bottom));
  z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08)
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0}
.ni-i{font-size:22px;transition:transform .2s}.ni-l{font-size:10px;color:var(--gr);font-weight:500}
.ni.on .ni-i{transform:scale(1.18)}.ni.on .ni-l{color:var(--v);font-weight:700}

/* ─── HOME ─── */
.hero{margin:14px;border-radius:20px;background:linear-gradient(135deg,var(--v),var(--v2));padding:22px 18px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'🌿';position:absolute;right:-8px;bottom:-18px;font-size:96px;opacity:.12;pointer-events:none}
.hero h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:5px}
.hero p{font-size:13px;opacity:.85;line-height:1.5}
.eco-row{display:flex;gap:8px;margin-top:14px}
.ecb{background:rgba(255,255,255,.18);backdrop-filter:blur(4px);border-radius:50px;padding:6px 14px;display:flex;align-items:center;gap:6px}
.ecn{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.ecl{font-size:11px;opacity:.8}
.sec{font-size:17px;font-weight:700;padding:14px 14px 8px;color:#1a1a1a}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}
.qc{background:#fff;border:1.5px solid #e8e8e0;border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .18s}
.qc:active{transform:scale(.97);background:#f5f5f0}
.qi{font-size:28px;margin-bottom:8px}.qt{font-size:13px;font-weight:600}.qs{font-size:11px;color:var(--gr);margin-top:2px}
.prow{display:flex;gap:12px;padding:0 14px 4px;overflow-x:auto}
.prow::-webkit-scrollbar{display:none}
.pc{min-width:148px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:14px;cursor:pointer;flex-shrink:0;transition:all .18s}
.pc:active{transform:scale(.97)}
.pe{font-size:34px;margin-bottom:8px}.pn{font-size:13px;font-weight:600}.ps{font-size:11px;color:var(--gr);margin-bottom:8px}
.hb{height:5px;background:#e8e8e0;border-radius:3px;overflow:hidden}
.hbf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--m),var(--v))}
.hbt{font-size:10px;color:var(--gr);margin-top:4px}
.est{text-align:center;padding:28px 14px}.esti{font-size:48px;margin-bottom:12px}.estt{font-size:14px;color:var(--gr);line-height:1.5}
.alst{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.alc{background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;border:1.5px solid #e8e8e0}
.ali{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#EFF6FF}
.alb{margin-left:auto;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600}
.urg{background:#FEE2E2;color:var(--ro)}.hoy{background:#FEF3C7;color:#92400E}.okb{background:#F0FDF4;color:#166534}
.tip{margin:0 14px 14px;background:linear-gradient(135deg,#f0f7f0,#e8f5e9);border-radius:16px;padding:16px;border-left:4px solid var(--v)}
.tipl{font-size:10px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tipt{font-size:13px;color:#2a2a2a;line-height:1.5}

/* ─── DIAGNÓSTICO ─── */
.dwrap{margin:0 14px 14px;border-radius:20px;overflow:hidden;border:1.5px solid #e8e8e0;background:#fff}
.czn{position:relative;background:#0d0d0d;min-height:240px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:20px 20px 0 0}
.cph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:8px}
.cph .ci{font-size:52px}.cph .ct{font-size:17px;font-weight:700;color:#fff}.cph .cs{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5;max-width:230px}
#cvid{width:100%;display:block;object-fit:cover;max-height:340px}
#cprev{width:100%;display:block;object-fit:cover;max-height:340px}
#ccan{display:none}
.vfx{position:absolute;inset:0;pointer-events:none}
.vfc{position:absolute;width:26px;height:26px;border-color:#4eff91;border-style:solid}
.vfc.tl{top:12px;left:12px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.vfc.tr{top:12px;right:12px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.vfc.bl{bottom:12px;left:12px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.vfc.br{bottom:12px;right:12px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.vfs{position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,#4eff91,transparent);animation:scan 2.2s ease-in-out infinite}
.vfbg{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#4eff91;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;letter-spacing:1px;white-space:nowrap}
.cctrl{display:flex;gap:10px;padding:12px 14px;background:#f8f8f5}
.cb{flex:1;padding:13px 8px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.cb:active{transform:scale(.96)}
.cb-cam{background:var(--v);color:#fff}
.cb-gal{background:#f0f0ea;color:#1a1a1a}
.cb-cancel{background:#fee2e2;color:var(--ro)}
.cb-snap{background:var(--v);color:#fff;flex:2}
.cb-analyze{background:linear-gradient(135deg,#1a3d1b,var(--v2));color:#fff;flex:2}
.cb-retake{background:#f0f0ea;color:#1a1a1a}
.aiload{display:none;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center;background:linear-gradient(135deg,#f0f7f0,#fafaf5);border-top:1px solid #e8e8e0}
.aiload.on{display:flex}
.ai-sp{font-size:40px;animation:spin 2s linear infinite}
.ai-t{font-size:16px;font-weight:700;color:var(--v)}.ai-s{font-size:13px;color:var(--gr);line-height:1.5}
.ai-steps{display:flex;flex-direction:column;gap:6px;width:100%}
.ai-step{font-size:12px;padding:7px 14px;border-radius:50px;background:#e8f5e9;color:var(--v);font-weight:600;transition:all .3s;text-align:center}
.ai-step.act{background:var(--v);color:#fff;animation:pulse 1s ease-in-out infinite}
.ai-step.dn{background:#c8e6c9;color:#1b5e20}
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1a3d1b,var(--v2));color:#fff;border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;margin:4px 14px 12px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#4eff91;animation:pulse 1.2s ease-in-out infinite}
/* Resultado diagnóstico */
.drh{background:linear-gradient(135deg,var(--v),var(--v2));padding:20px;color:#fff}
.drp{font-family:'Playfair Display',serif;font-size:21px;font-weight:700}
.drsp{font-size:12px;opacity:.8;margin-top:2px}
.drsc{text-align:center;padding:18px}
.drsn{font-family:'Space Mono',monospace;font-size:52px;font-weight:700}
.drsl{font-size:12px;color:var(--gr);text-transform:uppercase;letter-spacing:1px}
.drb{padding:0 18px 18px}
.drst{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gr);margin:14px 0 7px}
.drcd{font-size:16px;font-weight:700;margin-bottom:4px}
.drcz{font-size:13px;color:var(--gr);line-height:1.5}
.dtag{display:inline-block;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;margin:3px}
.tg{background:#F0FDF4;color:#166534}.tr{background:#FEE2E2;color:var(--ro)}
.axitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0ea}
.axic{font-size:17px;flex-shrink:0;margin-top:1px}.axtx{font-size:13px;color:#2a2a2a;line-height:1.5}
.drfull{font-size:13px;color:#2a2a2a;line-height:1.7;background:#f8f8f5;border-radius:12px;padding:14px;margin-top:6px}
.btnsave{width:calc(100% - 36px);margin:0 18px 18px;padding:14px;background:var(--v);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ─── COMUNIDAD ─── */
.vcard{margin:0 14px 12px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:15px;display:flex;gap:13px}
.vlog{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--v),var(--m));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.vnm{font-size:15px;font-weight:700;margin-bottom:3px}.vesp{font-size:12px;color:var(--gr);margin-bottom:7px}
.vtags{display:flex;gap:5px;flex-wrap:wrap}
.vtag{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;background:#f0f7f0;color:var(--v)}
.vbtns{margin-top:9px;display:flex;gap:7px}
.vbtn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--v);background:#fff;color:var(--v);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.vbtn.p{background:var(--v);color:#fff}.vbtn:active{transform:scale(.97)}

/* ─── PERFIL ─── */
.phdr{background:linear-gradient(160deg,var(--v),#1a3d1b);padding:28px 20px 22px;color:#fff;text-align:center}
.pav{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px}
.pnmx{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}.pemx{font-size:13px;opacity:.75;margin-top:3px}
.pstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#e8e8e0;border-radius:16px;margin:14px;overflow:hidden}
.pst{background:#fff;padding:16px 10px;text-align:center}
.psn{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--v)}.psl{font-size:11px;color:var(--gr);margin-top:3px}
.mit{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid #f0f0ea}
.mit:active{background:#f5f5f0}
.mic{width:40px;height:40px;border-radius:12px;background:#f0f7f0;display:flex;align-items:center;justify-content:center;font-size:20px}
.mtt{font-size:15px;font-weight:600}.mts{font-size:12px;color:var(--gr)}
.logbtn{margin:14px;width:calc(100% - 28px);padding:14px;background:#FEE2E2;color:var(--ro);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.misc{margin:0 14px 12px;background:#f0f7f0;border-radius:14px;padding:16px}
.mistl{font-size:13px;font-weight:700;color:var(--v);margin-bottom:6px}
.mistx{font-size:13px;color:#2a2a2a;line-height:1.6}

/* ─── DIARIO ─── */
.de{margin:0 14px 10px;background:#fff;border-radius:14px;border:1.5px solid #e8e8e0;padding:14px}
.demeta{display:flex;justify-content:space-between;margin-bottom:7px}
.dep{font-size:13px;font-weight:600;color:var(--v)}.ded{font-size:11px;color:var(--gr)}
.den{font-size:14px;color:#2a2a2a;line-height:1.5}
.deh{display:flex;align-items:center;gap:6px;margin-top:7px}
.dehl{font-size:11px;color:var(--gr)}.dehn{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--v)}

/* ─── MODAL ─── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.on{opacity:1;pointer-events:all}
.mc{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 40px;width:100%;max-width:430px;transform:translateY(40px);transition:transform .32s cubic-bezier(.22,1,.36,1);max-height:90vh;overflow-y:auto}
.mo.on .mc{transform:translateY(0)}
.mh{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.mtl{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;display:block}
.ep{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eo{font-size:24px;width:44px;height:44px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#f5f5f0;transition:all .15s}
.eo.sel{border-color:var(--v);background:#e8f5e9}
.si{width:100%;padding:14px 16px;border:1.5px solid #deded8;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bl);outline:none;appearance:none}
.rw{display:flex;align-items:center;gap:12px}
.rw input[type=range]{flex:1;accent-color:var(--v)}
.rv{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--v);width:38px;text-align:center}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:50px;font-size:14px;font-weight:500;z-index:9998;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:92%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ic">🌿</div>
  <div class="sp-t">EcoHuella</div>
  <div class="sp-s">Tu comunidad · Tu planeta · Tu huella</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════ AUTH ══════════ -->
<div class="scr on" id="scr-auth">
  <div class="auth-logo">
    <div style="font-size:56px;animation:float 2.5s ease-in-out infinite">🌱</div>
    <h1>EcoHuella</h1>
    <p>Tu comunidad · Tu planeta · Tu huella</p>
  </div>
  <div class="auth-card">
    <div class="atabs">
      <div class="atab on" onclick="stab('login')">Iniciar sesión</div>
      <div class="atab" onclick="stab('reg')">Registrarse</div>
    </div>
    <div class="aform on" id="af-login">
      <input class="inp" type="email" id="li-em" placeholder="Correo electrónico" autocomplete="email">
      <input class="inp" type="password" id="li-pw" placeholder="Contraseña" autocomplete="current-password">
      <button class="btnp" onclick="doLogin()">Entrar 🌿</button>
    </div>
    <div class="aform" id="af-reg">
      <input class="inp" type="text" id="re-nm" placeholder="Tu nombre completo" autocomplete="name">
      <input class="inp" type="email" id="re-em" placeholder="Correo electrónico" autocomplete="email">
      <input class="inp" type="password" id="re-pw" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password">
      <button class="btnp" onclick="doReg()">Crear cuenta 🌱</button>
    </div>
  </div>
</div>

<!-- ══════════ MAIN ══════════ -->
<div class="scr" id="scr-main">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="hav">🌿</div>
      <div><div class="hgr">Buenos días,</div><div class="hnm" id="hnm">Ecohabitante</div></div>
    </div>
    <button class="nbtn" onclick="nav('plantas')">🔔<span class="ndot"></span></button>
  </div>
  <div class="sc" id="mc"></div>
  <nav class="bnav">

<script>
// ══════════════════════════════════════════════════
// BASE DE DATOS — localStorage puro (sin WASM)
// ══════════════════════════════════════════════════
const DB = {
  _k: 'eco_data_v3',
  _d: null,
  load(){
    if(this._d) return;
    try{ this._d = JSON.parse(localStorage.getItem(this._k)) || {usuarios:[],plantas:[],diario:[],diags:[],seq:{u:1,p:1,d:1,g:1}}; }
    catch(e){ this._d = {usuarios:[],plantas:[],diario:[],diags:[],seq:{u:1,p:1,d:1,g:1}}; }
  },
  save(){ localStorage.setItem(this._k, JSON.stringify(this._d)); },
  nextId(t){ this.load(); const id=this._d.seq[t]||1; this._d.seq[t]=(id+1); return id; },
  // USUARIOS
  userByEmail(em){ this.load(); return this._d.usuarios.find(u=>u.email===em); },
  userById(id){ this.load(); return this._d.usuarios.find(u=>u.id===id); },
  addUser(nm,em,pw){ this.load(); const u={id:this.nextId('u'),nombre:nm,email:em,password:pw,creado:today()}; this._d.usuarios.push(u); this.save(); return u; },
  // PLANTAS
  plantas(uid){ this.load(); return this._d.plantas.filter(p=>p.uid===uid); },
  plantaById(id){ this.load(); return this._d.plantas.find(p=>p.id===id); },
  addPlanta(uid,em,nm,sp,ty,hl){ this.load(); const p={id:this.nextId('p'),uid,emoji:em,nombre:nm,especie:sp,tipo:ty,salud:hl,creado:today()}; this._d.plantas.push(p); this.save(); return p; },
  updSalud(pid,s){ this.load(); const p=this._d.plantas.find(x=>x.id===pid); if(p)p.salud=s; this.save(); },
  delPlanta(pid){ this.load(); this._d.plantas=this._d.plantas.filter(p=>p.id!==pid); this._d.diario=this._d.diario.filter(d=>d.planta_id!==pid); this._d.diags=this._d.diags.filter(d=>d.planta_id!==pid); this.save(); },
  // DIARIO
  diario(uid,limit){ this.load(); return this._d.diario.filter(d=>d.uid===uid).sort((a,b)=>b.id-a.id).slice(0,limit||100); },
  diarioPlanta(pid,limit){ this.load(); return this._d.diario.filter(d=>d.planta_id===pid).sort((a,b)=>b.id-a.id).slice(0,limit||10); },
  addDiario(pid,uid,act,hl,nt){ this.load(); const d={id:this.nextId('d'),planta_id:pid,uid,actividad:act,salud:hl,nota:nt,fecha:today()}; this._d.diario.push(d); this.save(); return d; },
  // DIAGNÓSTICOS
  diags(uid,limit){ this.load(); return this._d.diags.filter(d=>d.uid===uid).sort((a,b)=>b.id-a.id).slice(0,limit||10); },
  addDiag(uid,pid,cond,hl,res){ this.load(); const d={id:this.nextId('g'),uid,planta_id:pid,condicion:cond,salud:hl,resultado:res,fecha:today()}; this._d.diags.push(d); this.save(); return d; },
  countPlantas(uid){ this.load(); return this._d.plantas.filter(p=>p.uid===uid).length; },
  countDiario(uid){ this.load(); return this._d.diario.filter(d=>d.uid===uid).length; },
  countDiags(uid){ this.load(); return this._d.diags.filter(d=>d.uid===uid).length; },
};
function today(){ return new Date().toISOString().slice(0,10); }

function stab(t){
  document.querySelectorAll('.atab').forEach((e,i)=>e.classList.toggle('on',(i===0&&t==='login')||(i===1&&t==='reg')));
  document.getElementById('af-login').classList.toggle('on',t==='login');
  document.getElementById('af-reg').classList.toggle('on',t==='reg');
}
function doLogin(){
  const em=v('li-em').trim(), pw=v('li-pw');
  if(!em||!pw){toast('Completa todos los campos');return;}
  const u=DB.userByEmail(em);
  if(!u||u.password!==pw){toast('Correo o contraseña incorrectos');return;}
  loginOK(u);
}
function doReg(){
  const nm=v('re-nm').trim(),em=v('re-em').trim(),pw=v('re-pw');
  if(!nm||!em||!pw){toast('Completa todos los campos');return;}
  if(pw.length<6){toast('Contraseña mínimo 6 caracteres');return;}
  if(DB.userByEmail(em)){toast('Este correo ya está registrado');return;}
  loginOK(DB.addUser(nm,em,pw));
}
function loginOK(u){
  CU=u; localStorage.setItem('eco_uid',u.id);
  document.getElementById('scr-auth').classList.remove('on');
  document.getElementById('scr-main').classList.add('on');
  document.getElementById('hnm').textContent=u.nombre.split(' ')[0];
  nav('home');
}
function doLogout(){
  stopCam(); CU=null; localStorage.removeItem('eco_uid');

}

function rHome(){
  const pl=DB.plantas(CU.id);

    const cls=p.salud<40?'urg':p.salud<65?'hoy':'okb';
    const txt=cls==='urg'?'¡Urgente!':cls==='hoy'?'Hoy':'Bien';
    alts+=`<div class="alc"><div class="ali">💧</div><div><div style="font-size:14px;font-weight:600">${p.emoji} ${p.nombre}</div><div style="font-size:12px;color:var(--gr)">Riego recomendado</div></div><span class="alb ${cls}">${txt}</span></div>`;

    <div class="eco-row"><div class="ecb"><span class="ecn">${eco}%</span><span class="ecl">Salud prom.</span></div><div class="ecb"><span class="ecn">${pl.length}</span><span class="ecl">Plantas</span></div></div>

    <div class="qc" onclick="openD()"><div class="qi">📔</div><div class="qt">Diario</div><div class="qs">Nueva entrada</div></div>
    <div class="qc" onclick="nav('com')"><div class="qi">🤝</div><div class="qt">Viveros</div><div class="qs">Contacta expertos</div></div>

// ── CÁMARA ──
async function startCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    const vid=document.getElementById('cvid');
    if(!vid)return;
    vid.srcObject=camStream; vid.style.display='block';
    hide('cph'); show('vfx');
    showCtrl(1);
  }catch(e){
    toast('No se pudo acceder a la cámara. Usa el botón Galería o abre la app en tu navegador.');
    console.error(e);
  }
}
function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const v=document.getElementById('cvid');if(v)v.style.display='none';
  const p=document.getElementById('cprev');if(p)p.style.display='none';
  show('cph'); hide('vfx');
  showCtrl(0); capB64=null;
}
function snap(){
  const vid=document.getElementById('cvid');
  const can=document.getElementById('ccan');
  can.width=vid.videoWidth||640; can.height=vid.videoHeight||480;
  can.getContext('2d').drawImage(vid,0,0,can.width,can.height);
  showPrev(can.toDataURL('image/jpeg',.88));
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}
function loadGal(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>showPrev(ev.target.result);
  r.readAsDataURL(f);
  e.target.value='';
}
function showPrev(durl){
  capB64=durl.split(',')[1];
  const p=document.getElementById('cprev');
  const v=document.getElementById('cvid');
  if(p){p.src=durl;p.style.display='block';}
  if(v) v.style.display='none';
  hide('cph'); hide('vfx');
  showCtrl(2);
}
function retake(){
  capB64=null;
  const p=document.getElementById('cprev');if(p)p.style.display='none';
  show('cph'); showCtrl(0);
}
function showCtrl(n){
  ['cc0','cc1','cc2'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.style.display=i===n?'flex':'none';});
}
function show(id){const el=document.getElementById(id);if(el)el.style.display='flex';}

// ── CLAUDE AI ──
async function analyze(){
  if(!capB64){toast('Primero toma o sube una foto');return;}
  const selEl=document.getElementById('dpsel');
  const pid=selEl?parseInt(selEl.value)||null:null;
  const plant=pid?DB.plantaById(pid):null;

  showCtrl(-1); // oculta todos
  const ail=document.getElementById('ail'); if(ail)ail.classList.add('on');
  const dr=document.getElementById('dr'); if(dr)dr.innerHTML='';

  // Animación de pasos
  let si=0;
  const steps=['as0','as1','as2'];
  const iv=setInterval(()=>{
    if(si>0){
      const prev=document.getElementById(steps[si-1]);
      if(prev&&!prev.classList.contains('dn')){
        prev.classList.remove('act');
        prev.textContent='✅ '+prev.textContent.slice(3);
        prev.classList.add('dn');
      }
    }
    if(si<steps.length){
      const cur=document.getElementById(steps[si]);
      if(cur)cur.classList.add('act');
      si++;
    }
  },1900);

  try{
    const ctx=plant?`La planta es: ${plant.nombre} (${plant.especie||plant.tipo||'desconocido'}), salud registrada ${plant.salud}%.`:'No hay planta registrada.';
    const sys=`Eres EcoHuella AI, botánico experto con 20 años en diagnóstico fitosanitario y agronomía tropical en Latinoamérica. Analiza imágenes reales de plantas con precisión técnica.

REGLAS:
- Responde SOLO en español
- Analiza color de hojas, tallo, turgencia, manchas, plagas, morfología
- Si la imagen muestra un paisaje o no hay planta clara, indícalo en el diagnóstico pero proporciona observaciones útiles sobre lo que ves (vegetación, árboles, contexto)
- Sé técnico pero comprensible para usuarios venezolanos
- Proporciona consejos aplicables con insumos disponibles localmente

Responde ÚNICAMENTE con este JSON válido (sin markdown ni texto extra):
{
  "especie_detectada": "nombre común y científico si es posible",
  "condicion_detectada": "diagnóstico en 4-6 palabras",
  "causa_principal": "explicación técnica en 1-2 oraciones",
  "porcentaje_salud": 75,
  "indicadores_positivos": ["señal 1", "señal 2"],
  "indicadores_negativos": ["problema 1", "problema 2"],
  "primeros_auxilios": ["acción 1","acción 2","acción 3","acción 4","acción 5"],
  "cuidados_preventivos": ["prevención 1","prevención 2","prevención 3"],
  "nivel_urgencia": "bajo",
  "resumen_profesional": "4-5 oraciones de análisis completo y pronóstico."
}`;

    const umsg=`${ctx}\n\nAnaliza esta imagen botánicamente: color foliar, turgencia, síntomas de plagas o enfermedades, estrés hídrico o nutricional. Proporciona diagnóstico profesional completo.`;

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system:sys,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:capB64}},
          {type:'text',text:umsg}
        ]}]
      })
    });

    clearInterval(iv);
    steps.forEach(s=>{const el=document.getElementById(s);if(el){el.classList.remove('act');el.classList.add('dn');}});

    if(!resp.ok){
      const ed=await resp.json().catch(()=>({}));
      throw new Error(ed.error?.message||`Error ${resp.status}`);
    }
    const data=await resp.json();
    const rawTxt=data.content?.find(c=>c.type==='text')?.text||'';

    let result;
    try{
      result=JSON.parse(rawTxt.replace(/```json|```/g,'').trim());
    }catch{
      result={especie_detectada:'Planta analizada',condicion_detectada:'Ver análisis completo',causa_principal:'Análisis generado',porcentaje_salud:70,indicadores_positivos:['Analizado con IA'],indicadores_negativos:[],primeros_auxilios:['Revisa el análisis a continuación'],cuidados_preventivos:['Monitorea tu planta'],nivel_urgencia:'bajo',resumen_profesional:rawTxt};
    }

    if(ail)ail.classList.remove('on');
    const salud=Math.max(10,Math.min(100,parseInt(result.porcentaje_salud)||70));
    if(plant){DB.updSalud(plant.id,salud);}
    DB.addDiag(CU.id,pid,result.condicion_detectada||'Diagnóstico',salud,JSON.stringify(result));
    showResult(result,plant,salud);

  }catch(err){
    clearInterval(iv);
    if(ail)ail.classList.remove('on');
    showCtrl(2);
    console.error(err);
    toast('⚠️ Error al conectar con la IA: '+err.message);
  }
}

function showResult(r,plant,salud){
  const col=salud>=75?'#2C5F2D':salud>=50?'#D97706':'#C0392B';
  const urgMap={bajo:'#166534|#F0FDF4',moderado:'#92400E|#FEF3C7',alto:'#9A3412|#FEF2F2',crítico:'#7F1D1D|#FEE2E2'};
  const [uc,ubg]=(urgMap[r.nivel_urgencia]||urgMap['bajo']).split('|');
  const tP=(r.indicadores_positivos||[]).map(t=>`<span class="dtag tg">✅ ${t}</span>`).join('');
  const tN=(r.indicadores_negativos||[]).map(t=>`<span class="dtag tr">⚠️ ${t}</span>`).join('');
  const aux=(r.primeros_auxilios||[]).map((a,i)=>`<div class="axitem"><div class="axic">${['🩺','💊','🌿','💧','☀️'][i]||'🩺'}</div><div class="axtx">${a}</div></div>`).join('');
  const prev=(r.cuidados_preventivos||[]).map(a=>`<div class="axitem"><div class="axic">🔮</div><div class="axtx">${a}</div></div>`).join('');
  const dr=document.getElementById('dr');
  if(!dr)return;
  dr.innerHTML=`
  <div class="drh"><div class="drp">${plant?plant.emoji+' '+plant.nombre:'🔬 Análisis Botánico'}</div><div class="drsp">${r.especie_detectada||''} · ${today()}</div></div>
  <div class="drsc">
    <div class="drsn" style="color:${col}">${salud}%</div>
    <div class="drsl">Índice de salud</div>
    <div style="margin-top:8px"><span style="color:${uc};background:${ubg};font-size:12px;font-weight:700;padding:3px 12px;border-radius:50px">Urgencia: ${r.nivel_urgencia||'bajo'}</span></div>
  </div>
  <div class="drb">
    <div class="drst">Condición detectada</div>
    <div class="drcd">${r.condicion_detectada}</div>
    <div class="drcz">${r.causa_principal}</div>
    ${(tP||tN)?`<div class="drst">Indicadores observados</div>${tP}${tN}`:''}
    <div class="drst">Primeros auxilios</div>${aux}
    ${prev?`<div class="drst">Cuidados preventivos</div>${prev}`:''}
    <div class="drst">Análisis profesional completo</div>
    <div class="drfull">${r.resumen_profesional||''}</div>
  </div>
  <button class="btnsave" onclick="toast('Diagnóstico guardado ✅');nav('diag')">Guardar diagnóstico</button>`;
}

function openP(){document.getElementById('mo-p').classList.add('on');}
function openD(){
  const pl=DB.plantas(CU.id);
  if(!pl.length){toast('Primero agrega una planta');return;}
  document.getElementById('dps').innerHTML=pl.map(p=>`<option value="${p.id}">${p.emoji} ${p.nombre}</option>`).join('');
  document.getElementById('mo-d').classList.add('on');
}
function openDFor(pid){
  openD();
  setTimeout(()=>{const s=document.getElementById('dps');if(s)s.value=pid;},120);
}
function sE(el){document.querySelectorAll('.eo').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');SE=el.dataset.e;}
function savePlant(){
  const nm=v('pnm').trim();
  if(!nm){toast('Ingresa un nombre para la planta');return;}
  const sp=v('psp').trim(),ty=document.getElementById('pty').value;
  const hl=parseInt(document.getElementById('phl').value);
  const nt=v('pnt').trim();
  const pl=DB.addPlanta(CU.id,SE,nm,sp,ty,hl);
  if(nt) DB.addDiario(pl.id,CU.id,'🌱 Registro inicial',hl,nt);
  sv('pnm','');sv('psp','');sv('pnt','');
  document.getElementById('mo-p').classList.remove('on');
  toast(`${SE} ${nm} agregada!`); nav(CN);
}
function saveDiary(){
  const pid=parseInt(v('dps')); if(!pid){toast('Selecciona una planta');return;}
  const act=document.getElementById('dact').value;
  const hl=parseInt(document.getElementById('dhl').value);
  const nt=v('dnt').trim();
  DB.updSalud(pid,hl);
  DB.addDiario(pid,CU.id,act,hl,nt);
  sv('dnt','');
  document.getElementById('mo-d').classList.remove('on');
  toast('Entrada guardada en el diario 📔'); nav(CN);
}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on');}));

function expData(){
  const d={plantas:DB.plantas(CU.id),diario:DB.diario(CU.id),diagnosticos:DB.diags(CU.id)};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b); const a=document.createElement('a');
  a.href=u; a.download='ecohuella-datos.json'; a.click(); URL.revokeObjectURL(u);
  toast('Datos exportados 📤');
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3200);
}
